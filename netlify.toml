# DocScrive – Netlify build config (Next.js app in apps/client)
# See: https://docs.netlify.com/build/configure-builds/monorepos/
# Base directory ensures install + build run from the app so `next` is on PATH (fixes exit 127).

[build]
base = "apps/client"
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
