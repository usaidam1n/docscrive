# DocScrive – Netlify build config (Next.js app in apps/client)
# Monorepo: build from repo root so the Next.js plugin can bundle `next` into
# serverless functions (avoids "Cannot find module 'next/dist/server/lib/start-server.js').
# In Netlify UI set: Base directory = (empty) | Package directory = apps/client

[build]
command = "npm run build --workspace=@docscrive/client"
publish = "apps/client/.next"

[build.environment]
NODE_VERSION = "20"
