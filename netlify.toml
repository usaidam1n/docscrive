# DocScrive – Netlify build config (Next.js app in apps/client)
# Monorepo: treat `apps/client` as an independent Next.js app for Netlify.
# Netlify will install dependencies and run the build inside this directory,
# so `next` is available locally and can be bundled into serverless functions.
# In Netlify UI, leave Base directory empty (root) so this file controls it.

[build]
base = "apps/client"
command = "npm ci && npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
